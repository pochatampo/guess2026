<!DOCTYPE html>
<html lang="pt-br" >
  <head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Jogo de Advinhação</title>

    <style>
      .CorpoDaPagina{
        font-family: Arial, Helvetica, sans-serif;
        background-color: rgb(99, 5, 5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;

      }    
      h1{
        color: black;
      }
      .container{
          text-align: center;
          background-color: rgb(119, 31, 31);
          padding: 20px;
          border-radius: 10px;
          box-shadow: 0px 0px 10px rgb(51, 4, 4)
      }

      input[type="number"]{
        padding: 10px;
        font-size: 16px;
        width: 50px;
        margin-bottom: 10px;
      }

      button{
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: darkred;
        color: antiquewhite;
        border: none;
        border-radius: 5px;
      }

      .mensagem{
        margin-top: 20px;
        font-size: 18px;
      }

    </style>
  

  </head>


  <body class="CorpoDaPagina">

    <div class="container">

        <h1>&#127845; JOGO DE ADIVINHAÇÃO &#127845;</h1>
        <p>tente adivinhar o numero sercreto entre 1 e 100!!</p>

        <input type="number" id="TXTpalpite" min="1" max="100"/>
        <button id="BTNadivinhar"></button>
        <div class="message" id="DIVmenssagem"> mensagem ao jogador - TODO </div>
    </div>

  </body>



  </html>
